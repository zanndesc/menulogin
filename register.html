<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>susu mbg - buat akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header>
        <div class="logo">susumbg</div>
        <div class="burger-menu">☰</div>
    </header>

    <main class="login-wrapper">
        <h1 class="login-title">REGISTER</h1>
        <p class="login-subtitle">daftarkan diri anda</p>

        <form>
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" placeholder="masukkan username">
            </div>

            <div class="input-group">
                <label>email</label>
                <input type="email" placeholder="contoh@gmail.com">
            </div>

            <div class="input-group">
                <label>kata sandi</label>
                <input type="password" placeholder="buat kata sandi">
            </div>

            <div class="input-group">
                <label>konfirmasi sandi</label>
                <input type="password" placeholder="ulangi kata sandi">
            </div>

            <button type="submit" class="btn-login">daftar sekarang</button>
        </form>

        <p class="footer-text">
            sudah punya akun? <a href="index.html">masuk di sini</a>
        </p>
    </main>

</body>
</html>
